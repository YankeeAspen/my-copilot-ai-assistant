trigger: none

stages:
  - stage: DeployDev
    jobs:
      - deployment: DeployDevJob
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploy to dev"
                - script: echo "Run dev smoke tests"

  - stage: DeployStage
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployStageJob
        environment: stage
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploy to stage"
                - script: echo "Run stage checks"

  - stage: DeployProd
    dependsOn: DeployStage
    condition: succeeded()
    jobs:
      - deployment: DeployProdJob
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploy to prod"
                - script: echo "Post-deploy verification"
                - script: echo "Rollback hook if needed"
